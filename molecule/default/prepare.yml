---
- name: Prepare
  hosts: all
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install iptables
      ansible.builtin.apt:
        name: iptables
        state: present
      when: ansible_facts['os_family'] == 'Debian'

    - name: Use iptables-legacy (nft_compat cannot load xt_set in dind)
      ansible.builtin.command: update-alternatives --set iptables /usr/sbin/iptables-legacy
      changed_when: false
      when: ansible_facts['os_family'] == 'Debian'

    - name: Use ip6tables-legacy
      ansible.builtin.command: update-alternatives --set ip6tables /usr/sbin/ip6tables-legacy
      changed_when: false
      when: ansible_facts['os_family'] == 'Debian'

    - name: Load ip6_tables kernel module (not pre-loaded on some CI kernels)
      ansible.builtin.command: modprobe ip6_tables
      changed_when: false
      when: ansible_facts['os_family'] == 'Debian'
