---
- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Check rules.v4 exists
      ansible.builtin.stat:
        path: /etc/iptables/rules.v4
      register: iptables_v4_stat
    - name: Assert rules.v4 is present
      ansible.builtin.assert:
        that: iptables_v4_stat.stat.exists
        fail_msg: "/etc/iptables/rules.v4 was not created"

    - name: Check rules.v6 exists
      ansible.builtin.stat:
        path: /etc/iptables/rules.v6
      register: iptables_v6_stat
    - name: Assert rules.v6 is present
      ansible.builtin.assert:
        that: iptables_v6_stat.stat.exists
        fail_msg: "/etc/iptables/rules.v6 was not created"

    - name: Check netfilter-persistent service state
      ansible.builtin.systemd:
        name: netfilter-persistent
      register: iptables_svc
    - name: Assert netfilter-persistent is enabled
      ansible.builtin.assert:
        that: iptables_svc.status.UnitFileState == 'enabled'
        fail_msg: "netfilter-persistent is not enabled (state: {{ iptables_svc.status.UnitFileState }})"

    - name: Verify blocklist ipset is loaded in kernel
      ansible.builtin.command: ipset list blocklist
      changed_when: false

    - name: Verify 192.0.2.1 is a member of the live blocklist set
      ansible.builtin.command: ipset test blocklist 192.0.2.1
      changed_when: false

    - name: Check systemd drop-in exists when ipsets are defined
      ansible.builtin.stat:
        path: /etc/systemd/system/netfilter-persistent.service.d/ipset-first.conf
      register: iptables_dropin
    - name: Assert drop-in is present
      ansible.builtin.assert:
        that: iptables_dropin.stat.exists
        fail_msg: "drop-in ipset-first.conf is missing despite iptables_ipsets being non-empty"

    - name: Dump iptables-save for ordering diagnosis
      ansible.builtin.command: iptables-save
      register: _iptables_save_dump
      changed_when: false
      failed_when: false
    - name: Show iptables-save output
      ansible.builtin.debug:
        var: _iptables_save_dump.stdout_lines

    - name: Verify blocklist DROP precedes port 22 ACCEPT in kernel
      ansible.builtin.shell: |
        set -eo pipefail
        rules=$(iptables-save)
        ipset_line=$(echo "$rules" | grep -n 'match-set blocklist' | cut -d: -f1 | head -1)
        port_line=$(echo "$rules" | grep -n 'dport 22' | cut -d: -f1 | head -1)
        echo "ipset_line=$ipset_line port_line=$port_line"
        test "$ipset_line" -lt "$port_line"
      changed_when: false
      failed_when: false
      register: iptables_ordering_check
    - name: Assert blocklist DROP precedes port 22 ACCEPT
      ansible.builtin.assert:
        that: iptables_ordering_check.rc == 0
        fail_msg: >
          Kernel rule ordering violation: --match-set blocklist DROP does not
          precede --dport 22 ACCEPT in iptables-save output. A blocklisted IP
          would be accepted on port 22 before the DROP rule fires.
