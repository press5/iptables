---
- name: Write IPv4 rules file
  ansible.builtin.template:
    src: rules.v4.j2
    dest: "{{ iptables_v4_rules_path }}"
    owner: root
    group: root
    mode: "0600"
    backup: "{{ iptables_backup_rules }}"
    validate: "iptables-restore --test %s"
  register: _v4_rules
  # validate runs even in check mode; if packages haven't been installed yet
  # (they're skipped in check mode), the binary may not exist — ignore that.
  ignore_errors: "{{ ansible_check_mode }}"

- name: Write IPv6 rules file
  ansible.builtin.template:
    src: rules.v6.j2
    dest: "{{ iptables_v6_rules_path }}"
    owner: root
    group: root
    mode: "0600"
    backup: "{{ iptables_backup_rules }}"
    validate: "ip6tables-restore --test %s"
  register: _v6_rules
  ignore_errors: "{{ ansible_check_mode }}"

- name: Apply IPv4 rules
  ansible.builtin.command: iptables-restore {{ iptables_v4_rules_path }}
  when: _v4_rules.changed or iptables_force_reload
  changed_when: true

- name: Apply IPv6 rules
  ansible.builtin.command: ip6tables-restore {{ iptables_v6_rules_path }}
  when: _v6_rules.changed or iptables_force_reload
  changed_when: true
